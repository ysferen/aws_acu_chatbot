services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env

  db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  django-web:
    build: ./backend
    container_name: django-docker
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/chromadb-data:/app/chromadb-data
    depends_on:
      - db
      - ollama
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_ENGINE: ${DATABASE_ENGINE}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      ACADEMIC_AGENT_MODEL_ID: ${ACADEMIC_AGENT_MODEL_ID}
      OLLAMA_EMBEDDING_MODEL_ID: ${OLLAMA_EMBEDDING_MODEL_ID}
      VECTOR_STORE_PERSIST_DIR: ${VECTOR_STORE_PERSIST_DIR}
      APP_NAME: ${APP_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: ${LOG_DIR}
    env_file:
      - .env

  frontend:
    image: node:20-alpine
    container_name: frontend-docker
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - django-web
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://django-web:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  ollama_data:
  frontend_node_modules: